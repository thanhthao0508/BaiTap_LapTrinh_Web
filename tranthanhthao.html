<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Kiểm tra Mật khẩu - Học viện Ngân hàng</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; }
        h2 { color: #003366; }
    </style>
</head>
<body>

    <h2>Chương trình Kiểm tra Mật khẩu</h2>
    <p>Kết quả sẽ hiển thị qua thông báo (alert).</p>

    <script>
        function checkPassword() {
            let password = "";
            let isValid = false;

            while (!isValid) {
                password = prompt("Vui lòng nhập mật khẩu của bạn:");

                
                if (password === null) return; 

                let errors = [];

                
                if (password.length < 8) {
                    errors.push("- Ít nhất 8 ký tự.");
                }

                
                if (!/[A-Z]/.test(password)) {
                    errors.push("- Chứa ít nhất một chữ cái viết hoa (A-Z).");
                }

              
                if (!/[a-z]/.test(password)) {
                    errors.push("- Chứa ít nhất một chữ cái viết thường (a-z).");
                }

                
                if (!/[0-9]/.test(password)) {
                    errors.push("- Chứa ít nhất một chữ số (0-9).");
                }

                
                if (!/[!@#$%^&*(),.?":{}|<>]/.test(password)) {
                    errors.push("- Chứa ít nhất một ký tự đặc biệt (@, #, $, %...).");
                }

               
                if (errors.length > 0) {
                    alert("Mật khẩu không hợp lệ:\n" + errors.join("\n") + "\nVui lòng nhập lại!");
                } else {
                    isValid = true;
                    let strength = "";

                   
                    if (password.length === 8) {
                        strength = "Yếu";
                    } else if (password.length < 12) {
                        strength = "Trung bình";
                    } else {
                        strength = "Mạnh";
                    }

                    alert("Mật khẩu hợp lệ!\nĐộ mạnh: " + strength);
                }
            }
        }

        // Gọi hàm thực thi ngay khi trang web tải xong
        checkPassword();
    </script>
</body>
</html>
